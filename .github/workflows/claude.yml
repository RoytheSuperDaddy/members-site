name: Claude Code Automation

on:
  # 1. @claude 멘션 - Issue/PR 코멘트
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

  # 2. PR 자동 리뷰
  pull_request:
    types: [opened, synchronize]
    branches: [main]

  # 3. 매일 09:00 KST 자동 점검 (00:00 UTC = 09:00 KST)
  schedule:
    - cron: "0 0 * * *"

  # 4. 수동 트리거
  workflow_dispatch:
    inputs:
      task:
        description: "Claude에게 시킬 작업"
        required: true
        type: string

jobs:
  # ───────────────────────────────────────────────
  # JOB 1: @claude 멘션 처리
  # ───────────────────────────────────────────────
  claude-mention:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))

    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: |
            --max-turns 15
            --model claude-sonnet-4-6
            --mcp-config .mcp.json

  # ───────────────────────────────────────────────
  # JOB 2: PR 자동 리뷰 (디자인 시스템 위반 점검)
  # ───────────────────────────────────────────────
  claude-pr-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            이 PR을 다음 기준으로 리뷰하고 코멘트로 결과를 남겨줘:
            1. CLAUDE.md 디자인 시스템 위반 (금지된 폰트, 색상, 그림자, radius 등)
            2. 디자인 토큰 미사용 (하드코딩된 색상/크기)
            3. 13.5px 이하 본문 텍스트 사용
            4. 함수명/변수명 컨벤션 위반
            5. Supabase 키 등 민감 정보 노출

            위반 사항이 없으면 ✅ 승인 코멘트, 있으면 ❌ 구체적 라인 지적.
          claude_args: "--max-turns 5"

  # ───────────────────────────────────────────────
  # JOB 3: 매일 09:00 KST 자동 점검
  # ───────────────────────────────────────────────
  claude-daily-check:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            매일 점검 작업:
            1. members.html(또는 index.html)에서 다음 안티패턴 점검:
               - 디자인 토큰 미사용 (rgba(), #FFF 등 하드코딩)
               - 깊은 그림자 (0 8px 24px+, sh-lg 외)
               - 13.5px 이하 본문
               - emoji 2개 이상 카드
            2. 위반 사항이 있으면 새 Issue 생성:
               - 제목: "[자동 점검] 디자인 시스템 위반 N건"
               - 본문: 라인별 위반 사항 + 수정 제안
            3. 위반 없으면 종료 (Issue 생성 X).
          claude_args: "--max-turns 8 --mcp-config .mcp.json"

  # ───────────────────────────────────────────────
  # JOB 4: 수동 작업 트리거
  # ───────────────────────────────────────────────
  claude-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ inputs.task }}
          claude_args: |
            --max-turns 20
            --model claude-sonnet-4-6
            --mcp-config .mcp.json
